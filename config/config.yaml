corpus:
  base_dir: "data/corpus"
  folders:
    dgca_cars: "dgca_cars"
    faa_ads: "faa_ads"
    faa_sdrs: "faa_sdrs"
    nasa_asrs: "nasa_asrs"

ingestion:
  chunk_size: 2500
  chunk_overlap: 250
  source_map:
    dgca_cars: "dgca_car"
    faa_ads: "faa_ads"
    faa_sdrs: "faa_sdrs"
    nasa_asrs: "nasa_asrs"
  supported_extensions:
    - ".pdf"
    - ".xml"
    - ".html"
    - ".htm"
  aircraft_type: "Boeing 737"
  xml_content_tags:
    - "P"
    - "HD"
    - "FP"
    - "E"
    - "SUBJECT"
    - "SUM"
    - "DATES"
    - "EXTRACT"
    - "AMDPAR"
    - "CHED"
    - "ENT"
  xml_skip_tags:
    - "FRDOC"
    - "BILCOD"
    - "GPH"
  
  defect_keywords:
    crack:
      - "crack"
      - "cracking"
      - "fatigue"
      - "fracture"
      - "flaw"
      - "inspection"

    corrosion:
      - "corrosion"
      - "corroded"
      - "corrode"
      - "rust"
      - "oxidation"
      - "repair"
      - "inspection"

    scratch:
      - "scratch"
      - "scratched"
      - "gouge"
      - "abrasion"
      - "nick"
      - "scoring"
      - "surface damage"
      - "skin"

    dent:
      - "dent"
      - "dented"
      - "impact damage"
      - "deformation"
      - "bulge"
      - "skin panel"

    paint_damage:
      - "paint"
      - "coating"
      - "bare metal"
      - "primer"
      - "topcoat"
      - "peeling"
      - "chipping"
      - "blistering"
  
  chunk_separators:
    - "\n\n"
    - "\n"
    - ". "
    - " "
    - ""
  embedding_model: "all-MiniLM-L6-v2"

retrieval:
  collection_name: "aeroinspect_corpus"
  persist_directory: "data/vectorstore"
  top_k: 5
  score_threshold: 0.3
  chunk_batch_size: 500
  priority_order: {
        "dgca_car": 0,
        "faa_ads": 1,
        "faa_sdrs": 2,
        "nasa_asrs": 3,
    }
  chunk_preview_length: 500

llm:
  host: "localhost"
  url: "http://localhost:11434"
  model: "mistral:7b"
  timeout: 120
  temperature: 0.2
  max_retries: 2

  valid_airworthiness_statuses: {
    "AIRWORTHY",
    "AIRWORTHY_WITH_CONDITIONS",
    "GROUND_AIRCRAFT",
  }

reports:
  organization: "Air India Engineering Services Limited"


dataset_preparation:
  class_mapping:
    crack: 0
    corrosion: 1
    scratch: 2
    dent: 3
    paint_damage: 4

  # Original class IDs
  source_datasets:
    Corrosion:
      folder: "Corrosion"
      class_map:
        0: "corrosion"

    Multi:
      folder: "Multi"
      class_map:
        0: "crack"
        1: "dent"
        3: "paint_damage"
        4: "scratch"
      discard_classes:
        - 2

    Scratch:
      folder: "Scratch"
      class_map:
        0: "scratch"

  # Maximum samples per class per split (to prevent class dominance)
  max_samples_per_class:
    train: 1500
    valid: 200
    test: 200

  runtime_preprocessing:
  supported_image_extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"

  max_image_size: 4096

  severity:
  low_threshold: 5.0
  medium_threshold: 15.0

  training:
  epochs: 50
  image_size: 640
  batch_size: -1
  patience: 10
  device: 0
  model: "yolo11n.pt"
  run_name: "YOLO11"
  
  split_name_map: {
    "train": "train",
    "valid": "val",
    "test": "test",
  }